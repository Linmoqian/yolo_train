# YOLO 数据集配置

path: ../datasets/my_dataset

train: images/train
val: images/val
test: images/test

# 类别信息
nc: 10  # 类别数量
names:
  0: pod-box
  1: pod
  2: branch fruiting node
  3: fruiting node
  4: branch
  5: shattered pod-box
  6: shattered pod
  7: scale bar
  8: root
  9: main stem

# 目录结构
# datasets/my_dataset/
# ├── images/
# │   ├── train/
# │   ├── val/
# │   └── test/
# └── labels/
#     ├── train/
#     ├── val/
#     └── test/

# 标注格式: class_id center_x center_y width height
# 示例: 0 0.5 0.5 0.3 0.4
