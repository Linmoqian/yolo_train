
# 训练超参数

# 训练轮数
# - 值越大: 模型收敛越好，但训练时间越长，可能过拟合
# - 值越小: 训练快，但可能欠拟合
# - 建议: 从 100-300 开始，观察 loss 曲线调整
epochs: 10

# 输入图像尺寸 (像素)
# - 值越大: 检测小目标能力更强，精度更高，但显存占用大、速度慢（不OOM一次不是好炼丹师）
# - 值越小: 速度快、显存占用小，但小目标检测能力下降
# - 常用值: 320, 416, 512, 640, 1280
# - 必须是 32 的倍数
imgsz: 32

# 批次大小
# - 值越大: 训练更稳定，梯度估计更准确，但显存占用大
# - 值越小: 显存占用小，但训练可能不稳定
# - 建议: 根据 GPU 显存调整，尽可能大
# - 参考: 6GB 显存约 batch=4-8, 12GB 约 batch=16-32
batch: 2


# 保存根目录
# 所有实验结果保存在此目录下
project: runs/train

# 实验名称
# - 最终保存路径: {project}/{name}/
# - 内容包括: weights/, results.csv, 混淆矩阵等
# - 建议用有意义的名称如: yolov12n_100epochs, smoke_det_v1
name: exp
